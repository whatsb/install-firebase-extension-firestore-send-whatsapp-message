name: firestore-send-whatsapp-message 
version: 0.0.1  # Follow semver versioning
specVersion: v1beta  # Version of the Firebase Extensions specification
license: Apache-2.0  
billingRequired: true

displayName: Trigger WhatsApp Message from Firestore
description: >-
  Sends WhatsApp messages using the Whatsbox API when a new document is created in Firestore. It supports both template and session messaging.
icon: wb-icon-color-bg-white-512-padded.png
tags: ["whatsapp", "whatsbox"]

author:
  authorName: Whatsbox Team
  email: hello@whatsbox.io
  url: https://www.whatsbox.io

resources:
  - name: submit
    type: firebaseextensions.v1beta.v2function
    runtime: "nodejs22"
    properties:
      eventTrigger:
        eventType: google.cloud.firestore.document.v1.created
        triggerRegion: ${DATABASE_REGION}
        eventFilters:
          - attribute: database
            value: ${DATABASE}
          - attribute: document
            value: ${MESSAGES_COLLECTION}/{messageId}
            operator: match-path-pattern


params:
  - param: WHATSBOX_API_KEY
    label: WhatsBox API Key
    description: >-
      Generate your API key at [https://app.handoff.chat/settings/api-keys].
    type: string
    default: ""
    required: true
    immutable: false

  - param: DATABASE
    label: Firestore Instance ID
    description: >
      The Firestore database to use. Use "(default)" for the default database.
      You can find your available Firestore databases at
      [https://console.cloud.google.com/firestore/databases](https://console.cloud.google.com/firestore/databases).
    example: (default)
    default: (default)
    required: true

  - param: DATABASE_REGION
    label: Firestore Instance Location
    description: >
      Where is the Firestore database located? You can check your current
      database location at
      [https://console.cloud.google.com/firestore/databases](https://console.cloud.google.com/firestore/databases).
    type: select
    options:
      # Multi-region locations
      - label: Multi-region (Europe - Belgium and Netherlands)
        value: eur3
      - label: Multi-region (United States)
        value: nam5
      - label: Multi-region (Iowa, North Virginia, and Oklahoma)
        value: nam7

      # North America
      - label: Iowa (us-central1)
        value: us-central1
      - label: Oregon (us-west1)
        value: us-west1
      - label: Los Angeles (us-west2)
        value: us-west2
      - label: Salt Lake City (us-west3)
        value: us-west3
      - label: Las Vegas (us-west4)
        value: us-west4
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Northern Virginia (us-east4)
        value: us-east4
      - label: Columbus (us-east5)
        value: us-east5
      - label: Dallas (us-south1)
        value: us-south1
      - label: Montreal (northamerica-northeast1)
        value: northamerica-northeast1
      - label: Toronto (northamerica-northeast2)
        value: northamerica-northeast2
      - label: Queretaro (northamerica-south1)
        value: northamerica-south1

      # South America
      - label: Sao Paulo (southamerica-east1)
        value: southamerica-east1
      - label: Santiago (southamerica-west1)
        value: southamerica-west1

      # Europe
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: London (europe-west2)
        value: europe-west2
      - label: Frankfurt (europe-west3)
        value: europe-west3
      - label: Netherlands (europe-west4)
        value: europe-west4
      - label: Zurich (europe-west6)
        value: europe-west6
      - label: Milan (europe-west8)
        value: europe-west8
      - label: Paris (europe-west9)
        value: europe-west9
      - label: Berlin (europe-west10)
        value: europe-west10
      - label: Turin (europe-west12)
        value: europe-west12
      - label: Madrid (europe-southwest1)
        value: europe-southwest1
      - label: Finland (europe-north1)
        value: europe-north1
      - label: Stockholm (europe-north2)
        value: europe-north2
      - label: Warsaw (europe-central2)
        value: europe-central2

      # Middle East
      - label: Doha (me-central1)
        value: me-central1
      - label: Dammam (me-central2)
        value: me-central2
      - label: Tel Aviv (me-west1)
        value: me-west1

      # Asia
      - label: Mumbai (asia-south1)
        value: asia-south1
      - label: Delhi (asia-south2)
        value: asia-south2
      - label: Singapore (asia-southeast1)
        value: asia-southeast1
      - label: Jakarta (asia-southeast2)
        value: asia-southeast2
      - label: Taiwan (asia-east1)
        value: asia-east1
      - label: Hong Kong (asia-east2)
        value: asia-east2
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1
      - label: Osaka (asia-northeast2)
        value: asia-northeast2
      - label: Seoul (asia-northeast3)
        value: asia-northeast3

      # Australia
      - label: Sydney (australia-southeast1)
        value: australia-southeast1
      - label: Melbourne (australia-southeast2)
        value: australia-southeast2

      # Africa
      - label: Johannesburg (africa-south1)
        value: africa-south1
    required: true
    immutable: false

  - param: MESSAGES_COLLECTION
    label: WhatsApp message documents collection
    description: >-
      What is the path to the collection that contains the documents used to build and send the WhatsApp messages?
    type: string
    default: "whatsapp_messages"
    validationRegex: "^[^/]+(/[^/]+/[^/]+)*$"
    validationErrorMessage: Must be a valid Cloud Firestore collection
    required: true
    immutable: false

  - param: DEFAULT_FROM
    label: Default from
    description: >-
      The WhatsApp number connected on WhatsBox from which messages will be sent. If the `from` field is present in the added WhatsApp message document, it will be used instead of this value.
    type: string
    example: 16317471111
    validationRegex: "^[1-9][0-9]{7,14}$"
    validationErrorMessage: Must be a valid WhatsApp number in E.164 format without the + sign
    required: false
    
roles:
  - role: datastore.user
    reason: Allows this extension to access Cloud Firestore to read and process added WhatsApp message documents.
